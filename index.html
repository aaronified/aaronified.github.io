  <!-- Custom styles for non-utility elements -->
  <style>
    /* Antialiasing / Scaling fixes for crisp rendering */
    body {
      font-family: 'Inter', sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: optimizeLegibility;
    }
    
    h1, h2, h3, h4, h5, h6 {
      font-family: 'Plus Jakarta Sans', sans-serif;
    }

    /* Custom Scrollbar */
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }
    ::-webkit-scrollbar-track {
      background: transparent;
    }
    .dark ::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 9999px;
    }
    ::-webkit-scrollbar-thumb {
      background: rgba(15, 23, 42, 0.1);
      border-radius: 9999px;
    }
    .dark ::-webkit-scrollbar-thumb:hover {
      background: rgba(255, 255, 255, 0.2);
    }
    ::-webkit-scrollbar-thumb:hover {
      background: rgba(15, 23, 42, 0.2);
    }

    /* Mesh Grid Background */
    .bg-grid-pattern {
      background-size: 40px 40px;
      background-image: 
        linear-gradient(to right, rgba(148, 163, 184, 0.03) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(148, 163, 184, 0.03) 1px, transparent 1px);
    }
    .dark .bg-grid-pattern {
      background-image: 
        linear-gradient(to right, rgba(51, 65, 85, 0.12) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(51, 65, 85, 0.12) 1px, transparent 1px);
    }

    /* Inline text highlights driven by markers in the data:
         *number*  -> coloured figure   ^skill^ -> highlighter background   `software` -> pill
       Colour follows the themed card's --brand-color when present, else the site accent. */
    :root { --accent: #4f46e5; }   /* indigo-600 (light) */
    .dark { --accent: #fbbf24; }   /* amber-400 (dark) */

    .hl-num {
      color: var(--brand-color, var(--accent));
      font-weight: 700;
    }
    .hl-skill {
      background-color: color-mix(in srgb, var(--brand-color, var(--accent)) 15%, transparent);
      border-radius: 0.25rem;
      padding: 0 0.22em;
      font-weight: 600;
    }
    .hl-sw {
      display: inline-block;
      padding: 0.02em 0.5em;
      border-radius: 9999px;
      font-size: 0.85em;
      font-weight: 600;
      line-height: 1.5;
      color: var(--brand-color, var(--accent));
      background-color: color-mix(in srgb, var(--brand-color, var(--accent)) 10%, transparent);
      border: 1px solid color-mix(in srgb, var(--brand-color, var(--accent)) 30%, transparent);
      white-space: nowrap;
    }

    /* Smooth Height Accordion Classes */
    .accordion-grid {
      display: grid;
      grid-template-rows: 0fr;
      transition: grid-template-rows 350ms cubic-bezier(0.4, 0, 0.2, 1);
    }
    .accordion-grid.open {
      grid-template-rows: 1fr;
    }

    /* Sticky-bar condensed identity: fade its content in/out with the accordion reveal */
    .mini-identity-inner {
      opacity: 0;
      transition: opacity 300ms cubic-bezier(0.4, 0, 0.2, 1);
    }
    #mini-identity.open .mini-identity-inner {
      opacity: 1;
    }

    /* Accessibility Skip Link styling */
    .skip-to-content:focus {
      top: 1rem;
      left: 1rem;
    }

    /* Preferences and Accessibility rules */
    @media (prefers-reduced-motion: reduce) {
      * {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
        scroll-behavior: auto !important;
      }
    }

    /* ==========================================================
       PRINT / PDF LAYOUT (Beta)
       The screen app is hidden for print; a compact, purpose-built
       #print-resume block (populated by buildPrintResume()) is shown.
       downloadResume() forces light mode before window.print().
       ========================================================== */
    #print-resume { display: none; }

    @media print {
      @page { margin: 12mm; }

      /* Hide the on-screen app entirely; show only the compact resume */
      body > *:not(#print-resume) { display: none !important; }
      #print-resume { display: block !important; }

      /* Colour system: body = very dark grey, headers = black, highlights = bold blue */
      #print-resume {
        font-family: 'Inter', Arial, sans-serif;
        color: #2d2d2d;
        font-size: 9.5pt;
        line-height: 1.32;
      }
      #print-resume * { box-shadow: none !important; }
      #print-resume img { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
      #print-resume .pr-logo { width: 13px; height: 13px; object-fit: cover; border-radius: 2px; vertical-align: -2px; margin-right: 5px; display: inline-block; }

      #print-resume .pr-name,
      #print-resume .pr-section-h,
      #print-resume .pr-traj .co,
      #print-resume .pr-traj .role,
      #print-resume .pr-comp .t,
      #print-resume .pr-edu .t { color: #000; }

      /* All inline highlights render as bold blue (no pills/backgrounds) on paper */
      #print-resume .hl-num,
      #print-resume .hl-skill,
      #print-resume .hl-sw {
        color: #1d4ed8 !important; font-weight: 700;
        background: none !important; border: none !important; padding: 0 !important;
        border-radius: 0 !important; font-size: inherit; white-space: normal;
      }

      /* Hero: photo left, details right */
      .pr-hero { display: flex; gap: 14px; align-items: center; margin-bottom: 9px; }
      .pr-hero img { width: 76px; height: 76px; border-radius: 8px; object-fit: cover; object-position: top; flex: 0 0 auto; }
      .pr-name { font-family: 'Plus Jakarta Sans', Arial, sans-serif; font-size: 18pt; font-weight: 800; line-height: 1.08; }
      .pr-title { font-weight: 600; font-size: 10pt; margin-top: 1px; }
      .pr-meta { font-size: 8.5pt; margin-top: 3px; }
      .pr-meta a { color: inherit; text-decoration: none; }

      .pr-section-h {
        font-family: 'Plus Jakarta Sans', Arial, sans-serif; font-size: 11pt; font-weight: 700;
        margin: 10px 0 4px; border-bottom: 1px solid #d4d4d4; padding-bottom: 2px;
      }
      .pr-summary { margin: 0; }
      .pr-comp p { margin: 2.5px 0; }
      .pr-comp .t, .pr-edu .t { font-weight: 700; }
      .pr-edu p { margin: 2px 0; }
      .pr-edu .pr-sub { margin: 1px 0 1px 14px; font-size: 9pt; }   /* internship header nested under its college */
      .pr-edu .pr-sub-desc { margin: 0 0 3px 26px; font-size: 8.7pt; }   /* internship description/bullets */
      .pr-edu ul.pr-sub-desc { list-style: disc; padding-left: 15px; }

      /* Career trajectory: invisible-border table; each ROLE is a block with a separator between */
      table.pr-traj { width: 100%; border-collapse: collapse; }
      table.pr-traj td { vertical-align: top; padding: 1px 0; }
      .pr-traj tbody.pr-entry { break-inside: avoid; }
      /* Company + role share one flexible cell; each stays whole (nowrap) so the line only breaks
         between them, and only when it can't fit — company on line 1, role on line 2. */
      .pr-traj .who { padding-right: 8px; }
      .pr-traj .co { font-weight: 700; white-space: nowrap; }
      .pr-traj .role { white-space: nowrap; }
      .pr-traj .period { text-align: right; white-space: nowrap; padding-left: 10px; }
      .pr-traj .detail td { padding: 0 0 5px; }
      .pr-traj .lead { margin-bottom: 1px; }
      .pr-traj ul { list-style: disc; margin: 1px 0 0; padding-left: 15px; }  /* real bullets (override CDN reset) */
      .pr-traj li { margin: 0.5px 0; }
      .pr-traj tbody.pr-entry:not(:first-child) tr:first-child td { border-top: 1px solid #cbd5e1; padding-top: 6px; }
    }
  </style>

  <script>
    // Constants & DOM Nodes
    const themeSun = document.getElementById('theme-sun');
    const themeMoon = document.getElementById('theme-moon');

    // Document Ready Initialisation
    window.addEventListener('DOMContentLoaded', () => {
      initTheme();
      initAppContent();
      setSection('overview');
      initStickyIdentity();
      buildPrintResume();

      // Footer copyright
      document.getElementById('copyright-year').textContent = new Date().getFullYear();
      document.getElementById('copyright-name').textContent = PERSONAL_DATA.name;
    });

    // Reveal the condensed identity in the sticky bar once the hero scrolls out of view.
    function initStickyIdentity() {
      const hero = document.getElementById('hero');
      const miniIdentity = document.getElementById('mini-identity');
      if (!hero || !miniIdentity || !('IntersectionObserver' in window)) return;

      const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          // Hero visible -> hide condensed identity; hero gone -> reveal it.
          miniIdentity.classList.toggle('open', !entry.isIntersecting);
        });
      }, { threshold: 0 });

      observer.observe(hero);
    }

    // Theme Management (Light/Dark)
    function initTheme() {
      const savedTheme = localStorage.getItem('theme');
      const systemPrefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      
      if (savedTheme === 'dark' || (!savedTheme && systemPrefersDark)) {
        document.documentElement.classList.add('dark');
        themeSun.classList.remove('hidden');
      } else {
        document.documentElement.classList.remove('dark');
        themeMoon.classList.remove('hidden');
      }
    }

    function toggleTheme() {
      const isDark = document.documentElement.classList.toggle('dark');
      localStorage.setItem('theme', isDark ? 'dark' : 'light');
      
      if (isDark) {
        themeSun.classList.remove('hidden');
        themeMoon.classList.add('hidden');
      } else {
        themeSun.classList.add('hidden');
        themeMoon.classList.remove('hidden');
      }
      
      // Update dynamic brand colors according to theme
      updateDynamicBrandStyles();
    }

    // Download resume as PDF (Beta) via the browser's print -> Save as PDF.
    // Forces light mode for the printout (regardless of on-screen theme), then restores it.
    function downloadResume() {
      const wasDark = document.documentElement.classList.contains('dark');
      if (wasDark) {
        document.documentElement.classList.remove('dark');
        const restore = () => {
          document.documentElement.classList.add('dark');
          window.removeEventListener('afterprint', restore);
        };
        window.addEventListener('afterprint', restore);
      }
      window.print();
    }

    function setSection(sectionId) {

    // Convert inline highlight markers in user text to styled spans:
    //   *…* significant number (coloured)   ^…^ skill (highlight bg)   `…` software (pill)
    // Markers don't nest; other HTML in the string (e.g. <br>) is left untouched.
    function formatText(str) {
      if (str == null) return '';
      return String(str)
        .replace(/`([^`]+)`/g, '<span class="hl-sw">$1</span>')
        .replace(/\^([^^]+)\^/g, '<span class="hl-skill">$1</span>')
        .replace(/\*([^*]+)\*/g, '<span class="hl-num">$1</span>');
    }

    // Derive up-to-two-letter initials from a name (e.g. "Arani Das" -> "AD").
    function initialsFrom(name) {
      return name.trim().split(/\s+/).map(w => w[0]).join('').slice(0, 2).toUpperCase();
    }

    // Build a rounded-square gradient monogram SVG (no emoji/font-glyph dependency).
    function monogramSVG(initials) {
      return "<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'>"
        + "<defs><linearGradient id='adg' x1='0' y1='0' x2='1' y2='1'>"
        + "<stop offset='0' stop-color='#6366f1'/><stop offset='.5' stop-color='#a855f7'/><stop offset='1' stop-color='#ec4899'/>"
        + "</linearGradient></defs>"
        + "<rect width='100' height='100' rx='24' fill='url(#adg)'/>"
        + "<text x='50' y='66' text-anchor='middle' font-family='Plus Jakarta Sans, Inter, Arial, sans-serif' font-weight='700' font-size='46' fill='#fff'>"
        + initials + "</text></svg>";
    }

    // --- Derived profile facts (computed from TRAJECTORY_DATA) ---
    const MONTH_IDX = { jan: 0, feb: 1, mar: 2, apr: 3, may: 4, jun: 5, jul: 6, aug: 7, sep: 8, oct: 9, nov: 10, dec: 11 };

    // Parse "MMM YYYY" or "YYYY" into a Date (day 1); null if unparseable.
    function parseWhen(s) {
      s = (s || '').trim();
      const mo = s.match(/^([A-Za-z]{3,})\s+(\d{4})$/);
      if (mo) return new Date(+mo[2], MONTH_IDX[mo[1].slice(0, 3).toLowerCase()] || 0, 1);
      const yr = s.match(/^(\d{4})$/);
      if (yr) return new Date(+yr[1], 0, 1);
      return null;
    }

    // Split a "start - end" period; an end of Present/Current/Now (or blank) means today.
    function parsePeriod(period) {
      const parts = String(period || '').split(/\s*[-–—]\s*/);
      const start = parseWhen(parts[0]);
      const endStr = parts.length > 1 ? parts[1] : parts[0];
      const end = /present|current|now/i.test(endStr) ? new Date() : parseWhen(endStr);
      return { start, end };
    }

    function monthsBetween(a, b) {
      return Math.max(0, (b.getFullYear() - a.getFullYear()) * 12 + (b.getMonth() - a.getMonth()));
    }

    // Total professional experience = summed duration of 'work' roles (Present -> today).
    // Shown in months up to 24, then in whole years.
    function computeExperience() {
      let months = 0;
      TRAJECTORY_DATA.forEach(e => {
        if (e.type !== 'work') return;
        const { start, end } = parsePeriod(e.period);
        if (start && end) months += monthsBetween(start, end);
      });
      if (months < 24) return months + (months === 1 ? ' Month' : ' Months');
      const years = Math.floor(months / 12);
      return years + (years === 1 ? ' Year' : ' Years');
    }

    // The role currently held (period ending in Present), else the most recent entry.
    function currentRole() {
      return TRAJECTORY_DATA.find(e => /present|current|now/i.test(e.period)) || TRAJECTORY_DATA[0];
    }

    // Countries (with flag) + city count from trajectory locations ("City, Country").
    // Heading/text adapt: "Global" for multiple countries, "Geographic" for one.
    function deriveFootprint() {
      const countryFlag = new Map();   // insertion order = first appearance
      const cities = new Set();
      TRAJECTORY_DATA.forEach(e => {
        if (!e.location) return;
        const parts = e.location.split(',').map(s => s.trim()).filter(Boolean);
        if (parts.length) cities.add(parts[0]);
        const country = parts[parts.length - 1];
        if (country && !countryFlag.has(country)) countryFlag.set(country, e.flag || '');
      });
      const countries = [...countryFlag].map(([name, flag]) => ({ name, flag }));
      const nC = countries.length, nCity = cities.size;
      const cityWord = nCity === 1 ? 'city' : 'cities';
      let heading, text;
      if (nC > 1) {
        heading = 'Global Footprint';
        text = `Global footprint across ${nC} countries & ${nCity} ${cityWord}`;
      } else {
        heading = 'Geographic Footprint';
        const only = countries[0] ? countries[0].name : '';
        text = `Footprint across ${nCity} ${cityWord}${only ? ' in ' + only : ''}`;
      }
      return { countries, cities: nCity, heading, text };
    }

    // Build the compact print/PDF resume (hidden on screen; shown only when printing).
    // Purpose-built layout — independent of the screen DOM. Reuses the same data + helpers.
    function buildPrintResume() {
      const el = document.getElementById('print-resume');
      if (!el) return;

      const cityOf = loc => (loc || '').split(',')[0].trim();
      const base = (OVERVIEW_DATA.quickFacts || []).find(f => /base/i.test(f.label));

      // Live web-resume URL for the hero: explicit PERSONAL_DATA.website, else auto-derived from
      // the host (e.g. "aaronified.github.io"; skipped on local/file previews).
      const wloc = window.location || {};
      let webUrl = PERSONAL_DATA.website || '';
      if (!webUrl && wloc.hostname && !/^(localhost$|127\.|0\.0\.0\.0)/.test(wloc.hostname)) {
        webUrl = wloc.hostname + (wloc.pathname || '').replace(/index\.html?$/i, '').replace(/\/$/, '');
      }
      const webItem = webUrl ? `<a href="https://${webUrl.replace(/^https?:\/\//, '')}">${webUrl}</a>` : '';

      const contacts = PERSONAL_DATA.contacts
        .map(c => `<a href="${c.href}">${c.label}</a>`)
        .concat(webItem ? [webItem] : [])
        .join(' &middot; ');

      const logoImg = src => src ? `<img class="pr-logo" src="${src}" alt="">` : '';

      // Each ROLE is its own break-avoid block (so a multi-role org can span a page break, and a
      // separator rule falls between every role — including two roles at the same org).
      const roleBlock = (logo, co, role, period, desc, highlights) => {
        let d = desc ? `<div class="lead">${formatText(desc)}</div>` : '';
        if (highlights && highlights.length) {
          d += `<ul>${highlights.map(x => `<li>${formatText(x)}</li>`).join('')}</ul>`;
        }
        return '<tbody class="pr-entry">'
          + `<tr><td class="who">${logoImg(logo)}<span class="co">${co}</span> <span class="role">— ${role}</span></td><td class="period">${period}</td></tr>`
          + `<tr class="detail"><td colspan="2">${d}</td></tr>`
          + '</tbody>';
      };

      const workRows = TRAJECTORY_DATA.filter(e => e.type === 'work').map(e => {
        const co = `${e.company}, ${cityOf(e.location)}`;
        if (e.isMerged && e.roles && e.roles.length) {
          return e.roles.map(r => roleBlock(e.logo, co, r.role, r.period, r.description, r.highlights)).join('');
        }
        return roleBlock(e.logo, co, e.role, e.period, e.description, e.highlights);
      }).join('');

      // Education, with internships nested under the college attended at the time (matched by date).
      const eduList = TRAJECTORY_DATA.filter(e => e.type === 'education');
      const interns = TRAJECTORY_DATA.filter(e => e.type === 'internship');
      const startMs = p => { const d = parsePeriod(p).start; return d ? d.getTime() : 0; };
      const rangeMs = p => { const r = parsePeriod(p); return { s: r.start ? r.start.getTime() : 0, e: r.end ? r.end.getTime() : 0 }; };
      const nested = eduList.map(() => []);
      interns.forEach(intn => {
        const t = startMs(intn.period);
        let idx = eduList.findIndex(e => { const r = rangeMs(e.period); return t >= r.s && t <= r.e; });
        if (idx < 0) {   // fallback: college whose start date is closest
          let best = -1, diff = Infinity;
          eduList.forEach((e, i) => { const dd = Math.abs(rangeMs(e.period).s - t); if (dd < diff) { diff = dd; best = i; } });
          idx = best;
        }
        if (idx >= 0) nested[idx].push(intn);
      });
      const eduHTML = eduList.map((e, i) => {
        const subs = nested[i].map(intn => {
          let s = `<p class="pr-sub">↳ ${logoImg(intn.logo)}<span class="t">${intn.company}</span> — ${intn.role} &middot; ${intn.period}</p>`;
          if (intn.description) s += `<div class="pr-sub-desc">${formatText(intn.description)}</div>`;
          if (intn.highlights && intn.highlights.length) {
            s += `<ul class="pr-sub-desc">${intn.highlights.map(x => `<li>${formatText(x)}</li>`).join('')}</ul>`;
          }
          return s;
        }).join('');
        return `<p>${logoImg(e.logo)}<span class="t">${e.company}</span> — ${e.role}${e.score ? ` (${e.score})` : ''} &middot; ${e.period}</p>${subs}`;
      }).join('');

      const comp = OVERVIEW_DATA.competencies.map(c =>
        `<p><span class="t">${c.title}</span> — ${formatText(c.description)}</p>`
      ).join('');

      el.innerHTML = `
        <div class="pr-hero">
          <img src="${PERSONAL_DATA.profileImage}" alt="">
          <div>
            <div class="pr-name">${PERSONAL_DATA.name}</div>
            <div class="pr-title">${PERSONAL_DATA.title}</div>
            <div class="pr-meta">${contacts}</div>
            <div class="pr-meta"><strong>Experience:</strong> ${computeExperience()}${base ? '  &middot;  <strong>Base:</strong> ' + base.value : ''}</div>
          </div>
        </div>

        <div class="pr-section-h">Summary</div>
        <p class="pr-summary">${formatText(OVERVIEW_DATA.bio)}</p>

        <div class="pr-section-h">Core Competencies</div>
        <div class="pr-comp">${comp}</div>

        <div class="pr-section-h">Career Trajectory</div>
        <table class="pr-traj">${workRows}</table>

        ${eduHTML ? `<div class="pr-section-h">Education</div><div class="pr-edu">${eduHTML}</div>` : ''}
      `;
    }

      const referencesGrid = document.getElementById('references-grid');

      REFERENCES_DATA.forEach(ref => {
        const card = document.createElement('a');

        card.href = ref.linkedin;
        card.target = '_blank';
        card.rel = 'noopener';

        card.className = `
          group block p-5 rounded-2xl
          bg-white/40 dark:bg-slate-900/40
          border border-slate-200/50 dark:border-slate-800/50
          backdrop-blur-xl shadow-lg
          hover:-translate-y-0.5
          transition-all duration-300
        `;

        card.innerHTML = `
          <div class="flex items-center gap-4">
            <div class="w-14 h-14 rounded-xl overflow-hidden shadow-md border border-slate-200/50 dark:border-slate-800/50 bg-slate-100 dark:bg-slate-800 flex-shrink-0">
              <img src="${ref.avatarImage}" alt="${ref.name}" class="w-full h-full object-cover">
            </div>

            <div class="min-w-0">
              <h4 class="text-sm font-bold text-slate-900 dark:text-white truncate group-hover:whitespace-normal transition-all duration-300">
                ${ref.name}
              </h4>

              <p class="text-xs text-slate-500 dark:text-slate-400 line-clamp-2 group-hover:line-clamp-none transition-all duration-300">
                ${ref.title}
              </p>

              <p class="text-[10px] text-indigo-600 dark:text-amber-400 font-semibold tracking-wider uppercase mt-1">
                ${ref.relationship}
              </p>
            </div>
          </div>
        `;

        referencesGrid.appendChild(card);
      });

      // Career Trajectory timeline (reverse chronological order)
      const timelineFlow = document.getElementById('timeline-flow');
      timelineFlow.innerHTML = '';
      
      TRAJECTORY_DATA.forEach((item, index) => {
        const isOdd = index % 2 === 0;
        const isFirst = index === 0;
        const isLast = index === TRAJECTORY_DATA.length - 1;
        
        const row = document.createElement('div');
        row.id = `row-${item.id}`;
        row.className = 'relative flex gap-4 md:gap-0 md:grid md:grid-cols-9 items-stretch group/row';
        
        // Timeline line padding logic
        let railClass = 'absolute top-0 bottom-0 w-0.5 bg-slate-200 dark:bg-slate-800 transition-colors duration-300';
        if (isFirst) railClass = 'absolute top-1/2 bottom-0 w-0.5 bg-slate-200 dark:bg-slate-800 transition-colors duration-300';
        if (isLast) railClass = 'absolute top-0 bottom-1/2 w-0.5 bg-slate-200 dark:bg-slate-800 transition-colors duration-300';

        let timelineItemHTML = '';
        
        if (isOdd) {
          // Odd: Left side card, Right spacer
          timelineItemHTML = `
            <div class="w-full md:col-span-4 order-2 md:order-1 flex flex-col justify-center items-stretch md:items-end">
              ${generateCardMarkup(item)}
            </div>
            
            <div class="flex items-center justify-center relative md:col-span-1 order-1 md:order-2 w-8 md:w-auto flex-shrink-0">
              <div class="${railClass}"></div>
              <button onclick="toggleTimelineCard('${item.id}')" aria-label="Toggle details for ${item.company}" class="absolute w-8 h-8 rounded-full bg-slate-100 dark:bg-slate-900 border-2 border-slate-350 dark:border-slate-700 flex items-center justify-center z-10 transition-all duration-300 transform group-hover/row:scale-110 timeline-dot-node" id="dot-${item.id}" style="--node-brand-color: #6366f1;">
                <span class="w-3.5 h-3.5 rounded-full transition-transform duration-300 transform scale-75 timeline-dot-center" style="background-color: var(--node-brand-color);"></span>
              </button>
            </div>
            
            <div class="hidden md:block md:col-span-4 order-3"></div>
          `;
        } else {
          // Even: Left spacer, Right side card
          timelineItemHTML = `
            <div class="hidden md:block md:col-span-4 order-1"></div>
            
            <div class="flex items-center justify-center relative md:col-span-1 order-2 w-8 md:w-auto flex-shrink-0">
              <div class="${railClass}"></div>
              <button onclick="toggleTimelineCard('${item.id}')" aria-label="Toggle details for ${item.company}" class="absolute w-8 h-8 rounded-full bg-slate-100 dark:bg-slate-900 border-2 border-slate-350 dark:border-slate-700 flex items-center justify-center z-10 transition-all duration-300 transform group-hover/row:scale-110 timeline-dot-node" id="dot-${item.id}" style="--node-brand-color: #6366f1;">
                <span class="w-3.5 h-3.5 rounded-full transition-transform duration-300 transform scale-75 timeline-dot-center" style="background-color: var(--node-brand-color);"></span>
              </button>
            </div>
            
            <div class="w-full md:col-span-4 order-3 flex flex-col justify-center items-stretch md:items-start">
              ${generateCardMarkup(item)}
            </div>
          `;
        }
        
        row.innerHTML = timelineItemHTML;
        timelineFlow.appendChild(row);
      });
      
      // Setup dynamic brand colors
      updateDynamicBrandStyles();
      
      // All items start collapsed to satisfy User Request #6 (behaving erratically in auto-expand)
    }

    // Timeline card compiler
    function generateCardMarkup(item) {
      let typeIcon = 'briefcase';
      if (item.type === 'education') typeIcon = 'graduation-cap';
      if (item.type === 'internship') typeIcon = 'award';
      
      // Company link (opens in a new tab). stopPropagation so it doesn't toggle the card accordion.
      const hasLink = !!item.link;
      const linkAttrs = hasLink
        ? `href="${item.link}" target="_blank" rel="noopener" onclick="event.stopPropagation()" aria-label="Visit ${item.company} (opens in a new tab)"`
        : '';

      // Determine logo rendering (a subtle brand ring on hover cues that a linked logo is clickable)
      const logoInner = `<img src="${item.logo}" alt="${item.company} logo" class="w-full h-full object-cover">`;
      const logoHTML = item.logo
        ? (hasLink
            ? `<a ${linkAttrs} class="group/logo block flex-shrink-0 w-12 h-12 rounded-xl overflow-hidden bg-slate-100 dark:bg-slate-900 border border-slate-200/50 dark:border-slate-800/50 shadow-sm ring-0 ring-[var(--brand-color)] hover:ring-2 hover:border-[var(--brand-color)] transition-all duration-300 focus-visible:ring-2 outline-none">${logoInner}</a>`
            : `<div class="flex-shrink-0 w-12 h-12 rounded-xl overflow-hidden bg-slate-100 dark:bg-slate-900 border border-slate-200/50 dark:border-slate-800/50 shadow-sm">${logoInner}</div>`)
        : '';

      // Company name: linked variant gets a dashed underline on hover + a small external-link glyph.
      const companyHTML = hasLink
        ? `<a ${linkAttrs} class="group/company inline-flex items-center gap-1 font-bold text-slate-850 dark:text-slate-200 hover:text-[var(--brand-color)] transition-colors duration-200 focus-visible:ring-2 focus-visible:ring-[var(--brand-color)] rounded outline-none">
            <span class="border-b border-dashed border-slate-300/60 dark:border-slate-600/60 group-hover/company:border-[var(--brand-color)] transition-colors duration-200">${item.company}</span>
            <i data-lucide="arrow-up-right" class="w-3 h-3 opacity-40 group-hover/company:opacity-100 transition-opacity duration-200"></i>
          </a>`
        : `<span class="font-bold text-slate-850 dark:text-slate-200">${item.company}</span>`;

      if (item.isMerged) {
        // Merged Multiple-Role Segments (Tata CLiQ)
        return `
          <div id="card-${item.id}" onclick="event.stopPropagation(); toggleTimelineCard('${item.id}')" class="w-full text-left bg-white/40 dark:bg-slate-900/40 border border-slate-200/50 dark:border-slate-800/50 hover:border-[var(--brand-color)] hover:shadow-lg backdrop-blur-xl rounded-2xl shadow-sm transition-all duration-300 cursor-pointer overflow-hidden relative group/card border-l-[3.5px] border-l-[var(--brand-color)]">
            <div class="p-5">
              <div class="flex items-center justify-between gap-3 mb-3">
                <span class="inline-flex items-center gap-1 px-2.5 py-0.5 rounded-full text-[9px] font-extrabold tracking-wider uppercase bg-[var(--brand-bg)] text-[var(--brand-color)] border border-[var(--brand-bg-border)]">
                  <i data-lucide="${typeIcon}" class="w-2.5 h-2.5"></i> ${item.type}
                </span>

                <span class="text-[10px] sm:text-xs font-bold text-slate-600 dark:text-slate-400 bg-slate-100 dark:bg-slate-800/85 px-2.5 py-1 rounded-md border border-slate-200/50 dark:border-slate-700/50 shadow-sm tracking-wide">
                  ${item.period}
                </span>

                <button onclick="event.stopPropagation(); toggleTimelineCard('${item.id}')" class="inline-flex items-center gap-1.5 px-2.5 py-1 rounded-lg text-[10px] font-extrabold tracking-wider uppercase transition-all duration-300 bg-[var(--brand-bg)] text-[var(--brand-color)] border border-[var(--brand-bg-border)] hover:bg-[var(--brand-color)] hover:text-white dark:hover:text-slate-950 focus:outline-none" id="btn-toggle-${item.id}">
                  <span id="btn-text-${item.id}">Details</span>
                  <i data-lucide="chevron-down" class="w-3.5 h-3.5 transform transition-transform duration-300" id="chevron-${item.id}"></i>
                </button>
              </div>
              <div class="flex items-center gap-4 min-w-0">
                ${logoHTML}
                <div class="min-w-0">
                  <h3 class="text-lg font-bold font-display text-slate-900 dark:text-white leading-tight group-hover/card:text-[var(--brand-color)] transition-colors duration-200">
                    ${item.role}
                  </h3>
                  <div class="text-xs font-semibold text-slate-500 dark:text-slate-400 mt-1 flex flex-wrap items-center gap-x-2 gap-y-1">
                    ${companyHTML}
                    <span class="text-slate-400">•</span>
                    <span class="flex items-center gap-0.5">${item.flag} ${item.location}</span>
                  </div>
                </div>
              </div>
            </div>
            
            <div id="content-grid-${item.id}" class="accordion-grid">
              <div class="overflow-hidden">
                <div class="px-5 pb-5 pt-3 border-t border-slate-200/30 dark:border-slate-800/30 text-sm font-medium leading-relaxed text-slate-600 dark:text-slate-300 space-y-6">
                  ${item.roles.map((subRole, sIdx) => `
                    <div class="${sIdx > 0 ? 'border-t border-slate-200/30 dark:border-slate-800/30 pt-5' : ''}">
                      <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-1 mb-2">
                        <h4 class="text-sm font-extrabold text-slate-800 dark:text-slate-200">${subRole.role}</h4>
                        <span class="text-[10px] font-bold text-slate-500 bg-slate-100 dark:bg-slate-800 px-2 py-0.5 rounded border border-slate-200/30 dark:border-slate-750/30 self-start sm:self-auto">${subRole.period}</span>
                      </div>
                      <p class="text-xs mb-3 text-slate-600 dark:text-slate-400 font-medium">${formatText(subRole.description)}</p>
                      <ul class="space-y-2 text-xs">
                        ${subRole.highlights.map(hl => `
                          <li class="flex items-start gap-2">
                            <span class="mt-1.5 w-1.2 h-1.2 rounded-full bg-[var(--brand-color)] flex-shrink-0"></span>
                            <span class="flex-1">${formatText(hl)}</span>
                          </li>
                        `).join('')}
                      </ul>
                    </div>
                  `).join('')}
                </div>
              </div>
            </div>
          </div>
        `;
      }

      // Standard single-role timeline card
      return `
        <div id="card-${item.id}" onclick="event.stopPropagation(); toggleTimelineCard('${item.id}')" class="w-full text-left bg-white/40 dark:bg-slate-900/40 border border-slate-200/50 dark:border-slate-800/50 hover:border-[var(--brand-color)] hover:shadow-lg backdrop-blur-xl rounded-2xl shadow-sm transition-all duration-300 cursor-pointer overflow-hidden relative group/card border-l-[3.5px] border-l-[var(--brand-color)]">
          <div class="p-5">
            <div class="flex items-center justify-between gap-3 mb-3">
              <span class="inline-flex items-center gap-1 px-2.5 py-0.5 rounded-full text-[9px] font-extrabold tracking-wider uppercase bg-[var(--brand-bg)] text-[var(--brand-color)] border border-[var(--brand-bg-border)]">
                <i data-lucide="${typeIcon}" class="w-2.5 h-2.5"></i> ${item.type}
              </span>

              <span class="text-[10px] sm:text-xs font-bold text-slate-600 dark:text-slate-400 bg-slate-100 dark:bg-slate-800/85 px-2.5 py-1 rounded-md border border-slate-200/50 dark:border-slate-700/50 shadow-sm tracking-wide">
                ${item.period}
              </span>

              <button onclick="event.stopPropagation(); toggleTimelineCard('${item.id}')" class="inline-flex items-center gap-1.5 px-2.5 py-1 rounded-lg text-[10px] font-extrabold tracking-wider uppercase transition-all duration-300 bg-[var(--brand-bg)] text-[var(--brand-color)] border border-[var(--brand-bg-border)] hover:bg-[var(--brand-color)] hover:text-white dark:hover:text-slate-950 focus:outline-none" id="btn-toggle-${item.id}">
                <span id="btn-text-${item.id}">Details</span>
                <i data-lucide="chevron-down" class="w-3.5 h-3.5 transform transition-transform duration-300" id="chevron-${item.id}"></i>
              </button>
            </div>
            <div class="flex items-center gap-4 min-w-0">
              ${logoHTML}
              <div class="min-w-0">
                <h3 class="text-lg font-bold font-display text-slate-900 dark:text-white leading-tight group-hover/card:text-[var(--brand-color)] transition-colors duration-200">
                  ${item.role}
                </h3>
                <div class="text-xs font-semibold text-slate-500 dark:text-slate-400 mt-1 flex flex-wrap items-center gap-x-2 gap-y-1">
                  ${companyHTML}
                  <span class="text-slate-400">•</span>
                  <span class="flex items-center gap-0.5">${item.flag} ${item.location}</span>
                </div>
              </div>
            </div>
          </div>
          
          <div id="content-grid-${item.id}" class="accordion-grid">
            <div class="overflow-hidden">
              <div class="px-5 pb-5 pt-3 border-t border-slate-200/30 dark:border-slate-800/30 text-sm font-medium leading-relaxed text-slate-600 dark:text-slate-300 space-y-4">
                <p>${formatText(item.description)}</p>
                
                ${item.score ? `
                  <div class="inline-flex items-center gap-2 px-3 py-1.5 rounded-xl bg-indigo-500/5 dark:bg-amber-400/5 border border-indigo-500/10 dark:border-amber-400/10 text-xs font-bold">
                    <span class="text-slate-500">Academic Score:</span>
                    <span class="text-indigo-600 dark:text-amber-400 font-extrabold">${item.score}</span>
                  </div>
                ` : ''}
                
                ${item.highlights && item.highlights.length > 0 ? `
                  <ul class="space-y-2.5">
                    ${item.highlights.map(hl => `
                      <li class="flex items-start gap-2.5">
                        <span class="mt-1.5 w-1.2 h-1.2 rounded-full bg-[var(--brand-color)] flex-shrink-0"></span>
                        <span class="flex-1">${formatText(hl)}</span>
                      </li>
                    `).join('')}
                  </ul>
                ` : ''}
              </div>
            </div>
          </div>
        </div>
      `;
    }

    // Dynamic brand colors loader
    function updateDynamicBrandStyles() {
      const isDark = document.documentElement.classList.contains('dark');
      TRAJECTORY_DATA.forEach(item => {
        const card = document.getElementById(`card-${item.id}`);
        const dotNode = document.getElementById(`dot-${item.id}`);
        
        if (card && dotNode) {
          const color = isDark ? item.colors.dark : item.colors.light;
          
          card.style.setProperty('--brand-color', color);
          card.style.setProperty('--brand-bg', color + '12'); // 7% opacity
          card.style.setProperty('--brand-bg-border', color + '22'); // 13% opacity
          
          dotNode.style.setProperty('--node-brand-color', color);
        }
      });
    }

    // Toggle FAQ dropdown
    function toggleFaq(index) {
      const ansGrid = document.getElementById(`faq-ans-${index}`);
      const btn = document.getElementById(`faq-btn-${index}`);
      const icon = document.getElementById(`faq-icon-${index}`);
      
      const isOpen = ansGrid.classList.toggle('open');
      btn.setAttribute('aria-expanded', isOpen ? 'true' : 'false');
      
      if (isOpen) {
        icon.classList.add('rotate-45');
        icon.style.color = '#e11d48';
      } else {
        icon.classList.remove('rotate-45');
        icon.style.color = '';
      }
    }

    // Timeline card expander
    function toggleTimelineCard(cardId) {
      const targetItem = TRAJECTORY_DATA.find(c => c.id === cardId);
      if (!targetItem) return;
      
      const grid = document.getElementById(`content-grid-${cardId}`);
      const chevron = document.getElementById(`chevron-${cardId}`);
      const card = document.getElementById(`card-${cardId}`);
      const dot = document.getElementById(`dot-${cardId}`);
      const btnText = document.getElementById(`btn-text-${cardId}`);
      
      if (!grid) return;
      
      const isCurrentlyOpen = grid.classList.contains('open');
      const shouldOpen = !isCurrentlyOpen;
      
      // Close other cards for clean visualization
      if (shouldOpen) {
        TRAJECTORY_DATA.forEach(item => {
          if (item.id !== cardId) {
            const otherGrid = document.getElementById(`content-grid-${item.id}`);
            const otherChevron = document.getElementById(`chevron-${item.id}`);
            const otherCard = document.getElementById(`card-${item.id}`);
            const otherDot = document.getElementById(`dot-${item.id}`);
            const otherBtnText = document.getElementById(`btn-text-${item.id}`);
            
            if (otherGrid && otherGrid.classList.contains('open')) {
              otherGrid.classList.remove('open');
              if (otherChevron) otherChevron.classList.remove('rotate-180');
              if (otherBtnText) otherBtnText.textContent = 'Details';
              if (otherCard) {
                otherCard.classList.remove('ring-2', 'ring-[var(--brand-color)]/30', 'bg-white/70', 'dark:bg-slate-900/70', 'scale-[1.01]');
                otherCard.classList.add('bg-white/40', 'dark:bg-slate-900/40');
              }
              if (otherDot) {
                otherDot.classList.remove('scale-125', 'ring-4', 'ring-[var(--node-brand-color)]/30');
                otherDot.querySelector('.timeline-dot-center').classList.remove('scale-110');
                otherDot.querySelector('.timeline-dot-center').classList.add('scale-75');
              }
            }
          }
        });
      }
      
      // Update targeted card states
      if (shouldOpen) {
        grid.classList.add('open');
        if (chevron) chevron.classList.add('rotate-180');
        if (btnText) btnText.textContent = 'Collapse';
        if (card) {
          card.classList.add('ring-2', 'ring-[var(--brand-color)]/30', 'bg-white/70', 'dark:bg-slate-900/70', 'scale-[1.01]');
          card.classList.remove('bg-white/40', 'dark:bg-slate-900/40');
        }
        if (dot) {
          dot.classList.add('scale-125', 'ring-4', 'ring-[var(--node-brand-color)]/30');
          dot.querySelector('.timeline-dot-center').classList.remove('scale-75');
          dot.querySelector('.timeline-dot-center').classList.add('scale-110');
        }
      } else {
        grid.classList.remove('open');
        if (chevron) chevron.classList.remove('rotate-180');
        if (btnText) btnText.textContent = 'Details';
        if (card) {
          card.classList.remove('ring-2', 'ring-[var(--brand-color)]/30', 'bg-white/70', 'dark:bg-slate-900/70', 'scale-[1.01]');
          card.classList.add('bg-white/40', 'dark:bg-slate-900/40');
        }
        if (dot) {
          dot.classList.remove('scale-125', 'ring-4', 'ring-[var(--node-brand-color)]/30');
          dot.querySelector('.timeline-dot-center').classList.remove('scale-110');
          dot.querySelector('.timeline-dot-center').classList.add('scale-75');
        }
      }
    }
  </script>
</body>
</html>
